nav6d:
  n6d_path_evaluator:
    ros__parameters:
      # Topics for the path evaluator.
      map_topic: /octomap_full # OctoMap input (octomap_msgs/Octomap)
      path_topic: /nav6d/planner/path # Path to score (nav_msgs/Path)
      quality_topic: /nav6d/path_quality # Output score topic (nav6d/PathQuality)

      # Geometry + clearance settings.
      robot_radius: 0.225 # Collision radius (m)
      alpha: 0.5
      occupancy_threshold: 0.5 # Voxel occupancy probability treated as occupied
      sample_step: 0.25 # Minimum spacing (m) between sampled path poses
      min_path_length: 0.05 # Minimum path length before publishing (m)
      sharp_turn_threshold_rad: 1.0472 # Angle used for sharp-turn fraction (rad)
      runtime_info_logs_enabled: true # Runtime INFO logs (not init/warn/error)
      mc_timing_logs_enabled: false # Enable/disable Monte Carlo timing INFO logs

      # Monte Carlo robustness estimator (published in PathQuality.heuristic as goodness = 1-risk)
      mc_particles_per_pose: 10000 # More particles = smoother estimate, higher CPU
      mc_sigma_xy: 0.032 # Tracking uncertainty std dev in x/y (m)
      mc_sigma_z: 0.032 # Tracking uncertainty std dev in z (m)
      mc_sigma_clip: 3.0 # Clip particle noise to +/- N sigma
      mc_soft_margin: 0.10 # Clearance below this adds soft risk
      mc_topk_fraction: 0.10 # Aggregate risk from worst x% path samples
